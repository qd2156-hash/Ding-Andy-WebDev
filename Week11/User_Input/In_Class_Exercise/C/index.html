<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Simple User Input</title>
    <style>
      h1 {
        text-transform: uppercase;
      }

      .red {
        color: red;
      }

      .green {
        color: green;
      }

      .blue {
        color: blue;
      }

      .purple {
        color: blueviolet;
      }
    </style>
  </head>
  <body>
    <h1 id="changeMe">Get User Input</h1>

    <form>
      <fieldset>
        <legend>Pick a number between 0 and 3</legend>
        <label for="num">0-3</label>
        <input
          type="number"
          name="num"
          id="num"
          min="0"
          max="3"
          step="1"
          placeholder="1"
        />
        <button type="button" id="changeBtn" class="btnClass">
          Click to change the color of the H1
        </button>
      </fieldset>
    </form>
    <script>
      document.addEventListener('DOMContentLoaded', function () {
        // assign html elements to variables
        let myBtn = document.getElementById('changeBtn')
        myBtn.addEventListener('click', pickAClass)
      })

      // lets write a function that changes the color of the H1
      const pickAClass = () => {
        // grab our user input
        let userN = document.getElementById('num').value
        let n = parseInt(userN)
        console.log(typeof n)
        // storing the H1 element as a variable
        let h = document.getElementById('changeMe')

        // rather than having a laundry list of conditional statements
        // lets use a switch

        switch (n) {
          case 0:
            h.className = 'red'
            break
          case 1:
            h.className = 'green'
            break
          case 2:
            h.className = 'blue'
            break
          case 3:
            h.className = 'purple'
            break
          default:
            // this is the backup plan if n doesnt match any case
            // feel free to do stuff here
            break
        }
      }
    </script>
  </body>
</html>
