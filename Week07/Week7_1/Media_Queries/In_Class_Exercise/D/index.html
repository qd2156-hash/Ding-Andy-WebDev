     // Write a function to add or remove the .show class
     // see if iy has the class "show" already? if so, remove it
     // if not, add it.

    /*

      // call the function

      */

      // This should begin 90% of your JS code for HTML
      document.addEventListener('DOMContentLoaded', function() {
        // code in here will fire once all of the HTML abd CSS on the page has loaded
        // we do this so we don't try to select any elements on the page before they have rendered
        document.getElementById('mobile-menu').addEventListener('click', toggleShow)
      })

      // grab the hamburger and add an click event listener to fire the toggleShow function
      // these lines wont work because the content has not loaded yet. null cannot receive an event listener!
      // you will see an error in console and non of the code after will execute
      /*
      document.getElementById('mobile-menu').addEventListener('click', toggleShow)

      var hamburger = document.getElementById('mobile-menu')
      hamburger.addEventListener('click', toggleShow)
      */

      function toggleShow(){
        var menu = document.getElementById('menu')
        console.log(menu.classList)
        menu.classList.toggle('show')        
      }

    </script>

      <nav>
