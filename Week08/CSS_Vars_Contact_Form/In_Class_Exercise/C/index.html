<!doctype html>
<html lang="en">
  <head>
    <!-- Required meta tags -->
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />

    <title>CSS Vars | Contact Us</title>
    <link rel="stylesheet" type="text/css" href="./css/contact.css" />

  </head>
  <body id="blue">
    <body>
      <div class="container">
        <h1>Get In Touch!</h1>
        <!-- POST is for sending data no query string in the URL -->
        <form action="https://formspree.io/f/xgonapdl" method="POST">
          <div class="row">
            <label class="label-lg" for="name">Name:</label>
            <input name="name" type="text" class="input-lg" required/>

            <label class="label-lg" for="email">Email:</label>
            <input name="email" type="text" class="input-lg" required/>
          </div>

          <div class="message-area">
            <label for="message" class="label-lg">Leave me a message!</label>
            <textarea name="message" class="message" placeholder="Leave a comment or question here!" required></textarea>
          </div>
          <div class="button-bar">
            <button class="btn-dark" type="submit">Send</button>

          </div>
          <input type="hidden" name="subject" value="New Submission From: {{name}}" />

        </form>
      </div>
    </body>
  </body>
</html>
