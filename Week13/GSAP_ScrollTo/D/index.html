<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Elevator Scrolling Example</title>
    <style type="text/css" media="screen">
      body {
        font-family: Arial, Helvetica, sans-serif;
        margin-top: 40px;
        padding-top: 100px;
        color: white;
        background-color: rgb(24, 19, 19);
      }

      #main {
        margin: 0 auto;
        width: 800px;
      }

      section {
        padding: 20px 0 80px 0;
        height: 100vh;
      }

      section h2 {
        font-size: 48px;
        border-bottom: 2px solid #ccc;
        padding-bottom: 20px;
      }

      ul {
        position: fixed;
        top: 40%;
        right: 0;
        list-style-type: none;
      }

      li {
        width: 50px;
        padding: 10px;
        margin-bottom: 1px;
        color: #ccc;
        border-left: 10px solid #ccc;
        cursor: pointer;
        transition: all 0.5s;
      }

      .active {
        color: #fff;
        border-left: 20px solid #fff;
        line-height: 30px;
      }
    </style>
  </head>
  <body>
    <!-- elevator buttons -->
    <ul>
      <li id="floor5Btn">5</li>
      <li id="floor4Btn">4</li>
      <li id="floor3Btn">3</li>
      <li id="floor2Btn">2</li>
      <li id="floor1Btn">1</li>
    </ul>

    <!-- floors -->
    <div id="main">
      <section id="floor5Panel">
        <h2>Floor 5</h2>
      </section>

      <section id="floor4Panel">
        <h2>Floor 4</h2>
      </section>

      <section id="floor3Panel">
        <h2>Floor 3</h2>
      </section>

      <section id="floor2Panel">
        <h2>Floor 2</h2>
      </section>

      <section id="floor1Panel">
        <h2>Floor 1</h2>
      </section>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.4/ScrollToPlugin.min.js"></script>
    <script type="text/javascript">
      // WE DONT HAVE TO REGISTER PLUGIN SINCE WE LOADED THE SCRIPT FOR SCROLLTO PLUGIN MANUALLY

      document.addEventListener('DOMContentLoaded', () => {
        gsap.from('body', 1, {
          opacity: 0,
        })
        gsap.from('ul', 1, {right: -500, delay: 0.5})

        const floor1Btn = document.getElementById('floor1Btn')
        const floor2Btn = document.getElementById('floor2Btn')
        const floor3Btn = document.getElementById('floor3Btn')
        const floor4Btn = document.getElementById('floor4Btn')
        const floor5Btn = document.getElementById('floor5Btn')

        let navButtons = document.getElementsByTagName('LI')
        console.log(navButtons)
        //cast this HTML collection into a new Array
        navButtons = [].slice.call(navButtons)
        console.log(navButtons)

        navButtons.forEach((button) => {
          button.addEventListener('mouseenter', function () {
            gsap.to(this, {className: 'active', duration: 0.5})
          })
        })

        navButtons.forEach((button) => {
          button.addEventListener('mouseleave', function () {
            gsap.to(this, {className: '', duration: 0.5})
          })
        })

        // get the scroll position for the top of each section/floor
        console.log(
          document.querySelector('#floor1Panel').getClientRects()[0].top
        )
        // assign the scroll pos to the corresponding elevator button
        floor1Btn.setAttribute(
          'data-scrollpos',
          document.querySelector('#floor1Panel').getClientRects()[0].top
        )
        floor2Btn.setAttribute(
          'data-scrollpos',
          document.querySelector('#floor2Panel').getClientRects()[0].top
        )
        floor3Btn.setAttribute(
          'data-scrollpos',
          document.querySelector('#floor3Panel').getClientRects()[0].top
        )
        floor4Btn.setAttribute(
          'data-scrollpos',
          document.querySelector('#floor4Panel').getClientRects()[0].top
        )
        floor5Btn.setAttribute(
          'data-scrollpos',
          document.querySelector('#floor5Panel').getClientRects()[0].top
        )

        // assign a function on click to each of our elevator buttons
        navButtons.forEach((button) => {
          button.addEventListener('click', function () {
            // pull out the scrollpos value and animate to it
            let myScrollPos = this.getAttribute('data-scrollpos')
            gsap.to(window, 3, {scrollTo: myScrollPos, ease: 'elastic.out'})
          })
        })

        // get the pixel direction/location of the first floor so we can animate to it on load

        let initialFloor = document
          .getElementById('floor2Btn')
          .getAttribute('data-scrollpos')

        gsap.to(window, {
          duration: 4,
          scrollTo: initialFloor,
          ease: 'elastic.out',
        })
      })
    </script>
  </body>
</html>
