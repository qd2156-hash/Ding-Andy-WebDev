<!doctype html>
<html>
  <head>
    <title>Simple Timeline</title>
    <style type="text/css" media="screen">
      body {
        text-align: center;
      }

      .progress {
        position: relative;
        z-index: 5;
        width: 100%;
        height: 10px;
        background-color: black;
      }

      h2,
      p {
        text-shadow: 4px 4px 8px rgba(0, 0, 0, 0.5);
        position: relative;
      }
    </style>
  </head>

  <body>
    <div class="progress"></div>
    <div id="page-wrap">
      <h2>Hello Green Sock</h2>
      <h2>You're Awesome</h2>
      <p id="description">
        I just made my first timeline and thats pretty cool!
      </p>
    </div>
    <!--
      Older free without subscription versions
      https://github.com/greensock/GSAP
    -->
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12/dist/gsap.min.js"></script>
    <!-- Our Script using GSAP Library Functions -->
    <script type="text/javascript">
      document.addEventListener('DOMContentLoaded', () => {
        const headers = document.getElementsByTagName('H2') // an array/ node list of our headers
        const hello = headers[0]
        const awesome = headers[1]
        const text = document.getElementById('description')
        const progress = document.getElementsByClassName('progress')[0]
        const bg = document.querySelector('#page-wrap')

        // make a timeline to store our animations
        const tl = new TimelineLite()

        // now we add our different animations to our timeline and it automatically puts one right after the other
        tl.from(bg, 1, {opacity: 0})
          .from(hello, 1.5, {
            left: -500,
            opacity: 0,
          })
          .from(awesome, {
            duration: 1.5,
            right: -1000,
            opacity: 0,
          })
          .from(text, {
            duration: 2.0,
            bottom: -1000,
            opacity: 0,
          })
          .from(
            progress,
            tl.duration(),
            {
              scaleX: 0,
              transformOrigin: 'left', // default transform-origin is center center
              ease: Linear.easeNone,
            },
            0
          ) // finally, fade the timeline progress bar away since the animation is complete
          .to(progress, 0.2, {opacity: 0, top: -10})
      })
    </script>
  </body>
</html>
